<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공직사회 초과근무수당 계산기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"맑은 고딕",sans-serif;
}

body{
    background:#f2f5f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:430px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#004a99;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0066cc;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#004c99;
}

.result{
    margin-top:25px;
    background:#eef6ff;
    padding:18px;
    border-radius:10px;
}

.result p{
    margin:10px 0;
    font-size:17px;
}

.money{
    color:#d60000;
    font-size:24px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>공직사회 초과근무수당 계산기</h2>

<div class="input-group">
<label>월 기본급(원)</label>
<input type="number" id="salary" placeholder="예) 3200000">
</div>

<div class="input-group">
<label>시간외근무(시간)</label>
<input type="number" id="overtime" value="0">
</div>

<div class="input-group">
<label>야간근무(시간)</label>
<input type="number" id="night" value="0">
</div>

<div class="input-group">
<label>휴일근무(시간)</label>
<input type="number" id="holiday" value="0">
</div>

<button onclick="calculate()">
계산하기
</button>

<div class="result">

<p>시간당 단가 :
<strong id="hourPay">0 원</strong>
</p>

<p>시간외수당 :
<strong id="otPay">0 원</strong>
</p>

<p>야간수당 :
<strong id="nightPay">0 원</strong>
</p>

<p>휴일수당 :
<strong id="holidayPay">0 원</strong>
</p>

<hr style="margin:15px 0">

<p class="money">
총 지급액 :
<span id="total">0 원</span>
</p>

</div>

</div>

<script>

function money(num){
    return Math.round(num).toLocaleString()+" 원";
}

function calculate(){

    const salary = Number(document.getElementById("salary").value);

    const overtime = Number(document.getElementById("overtime").value);

    const night = Number(document.getElementById("night").value);

    const holiday = Number(document.getElementById("holiday").value);

    // 월 소정근로시간(209시간 기준)
    const hourPay = salary / 209;

    // 예시 지급률
    const overtimePay = overtime * hourPay * 1.5;

    const nightPay = night * hourPay * 0.5;

    const holidayPay = holiday * hourPay * 1.5;

    const total = overtimePay + nightPay + holidayPay;

    document.getElementById("hourPay").innerHTML = money(hourPay);

    document.getElementById("otPay").innerHTML = money(overtimePay);

    document.getElementById("nightPay").innerHTML = money(nightPay);

    document.getElementById("holidayPay").innerHTML = money(holidayPay);

    document.getElementById("total").innerHTML = money(total);

}

</script>

</body>
</html>
